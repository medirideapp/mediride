name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Needed for GHCR. Org admins must ALSO allow Actions to create packages
# (see docs/CI_GHCR_SETUP.md locally / Desktop review note).
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm prisma:generate
        env:
          DATABASE_URL: postgresql://nemt:nemt@localhost:5432/nemt

      - name: Build API
        run: pnpm --filter @nemt/api build

      - name: Build Web
        run: pnpm --filter @nemt/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_WS_URL: http://localhost:3001
          NEXT_PUBLIC_MAPBOX_TOKEN: pk.placeholder

  # Build Docker images always on main; push to GHCR only when enabled.
  # Reason: medirideapp org blocked package create → CI was red.
  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Decide whether to push GHCR
        id: ghcr
        run: |
          if [ "${{ vars.ENABLE_GHCR_PUSH }}" = "true" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "GHCR push disabled. Set repo variable ENABLE_GHCR_PUSH=true after org package permission is fixed."
          fi

      - name: Login to GHCR
        if: steps.ghcr.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: ${{ steps.ghcr.outputs.push == 'true' }}
          load: ${{ steps.ghcr.outputs.push != 'true' }}
          tags: ghcr.io/${{ github.repository }}/api:latest

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: ${{ steps.ghcr.outputs.push == 'true' }}
          load: ${{ steps.ghcr.outputs.push != 'true' }}
          tags: ghcr.io/${{ github.repository }}/web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL || 'http://localhost:3001' }}
            NEXT_PUBLIC_MAPBOX_TOKEN=${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN || 'pk.placeholder' }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    # Only when VPS secrets exist AND GHCR push is on
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.ENABLE_GHCR_PUSH == 'true' &&
      secrets.DEPLOY_HOST != ''
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/nemt-platform' }}
            docker compose -f docker-compose.prod.yml pull || true
            export API_IMAGE=ghcr.io/${{ github.repository }}/api:latest
            export WEB_IMAGE=ghcr.io/${{ github.repository }}/web:latest
            docker compose -f docker-compose.prod.yml up -d
