# Local development: Postgres+PostGIS, Redis, API, Web, Nginx
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: nemt-postgres
    environment:
      POSTGRES_USER: nemt
      POSTGRES_PASSWORD: nemt_secret
      POSTGRES_DB: nemt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-postgis.sql:/docker-entrypoint-initdb.d/01-postgis.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nemt -d nemt"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nemt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nemt-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://nemt:nemt_secret@postgres:5432/nemt?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: 3001
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nemt-web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    container_name: nemt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
